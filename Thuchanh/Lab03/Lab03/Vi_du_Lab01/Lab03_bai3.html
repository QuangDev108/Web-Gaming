<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Thêm Sản Phẩm</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            background: #f5f5f5;
            padding: 16px;
            color: #333;
        }

        #container {
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border-radius: 6px;
            padding: 18px 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-title {
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .form-label {
            width: 110px;
            min-width: 110px;
            font-size: 13px;
            color: #333;
        }

        .form-control {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        select,
        textarea {
            padding: 4px 7px;
            border: 1px solid #aaa;
            border-radius: 3px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            color: #333;
            background: #fff;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #4a90d9;
        }

        input[type="text"].full,
        input[type="number"].full {
            width: 100%;
        }

        .kichthuoc-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kichthuoc-group input {
            width: 60px;
        }

        .kichthuoc-group span {
            font-size: 13px;
        }

        input[type="color"] {
            width: 36px;
            height: 24px;
            border: 1px solid #aaa;
            border-radius: 3px;
            cursor: pointer;
            padding: 1px 2px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px 10px;
        }

        .checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            height: 90px;
            resize: vertical;
            font-size: 12px;
        }

        .mota-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 8px;
        }

        .mota-row .form-label {
            padding-top: 4px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
        }

        input[type="submit"] {
            padding: 6px 20px;
            background: #e8e8e8;
            border: 1px solid #aaa;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }

        input[type="reset"] {
            padding: 6px 20px;
            background: #e8e8e8;
            border: 1px solid #aaa;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background: #d5d5d5;
        }

        select[name="nmLive"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="container">
        <form name="frmThemSanPham" action="../../xl_lab03_bai3.php" method="post" enctype="multipart/form-data">

            <div class="form-title">THÊM SẢN PHẨM MỚI</div>

            <!-- 1. Mã sản phẩm -->
            <div class="form-row">
                <div class="form-label">Mã sản phẩm</div>
                <div class="form-control">
                    <input type="text" name="nmProID" class="full" />
                </div>
            </div>

            <!-- 2. Tên sản phẩm -->
            <div class="form-row">
                <div class="form-label">Tên sản phẩm</div>
                <div class="form-control">
                    <input type="text" name="nmProName" class="full" />
                </div>
            </div>

            <!-- 3. Hình ảnh -->
            <div class="form-row">
                <div class="form-label">Hình ảnh</div>
                <div class="form-control">
                    <input type="file" name="nmProImg" />
                </div>
            </div>

            <!-- 5. Hãng sản xuất -->
            <div class="form-row">
                <div class="form-label">Hãng sản xuất</div>
                <div class="form-control">
                    <select name="nmMan" style="width:100%">
                        <option value="ThienLong">Thiên Long</option>
                        <option value="HongHa">Hồng Hà</option>
                        <option value="BenNghe">Bến Nghé</option>
                        <option value="Other">Khác</option>
                    </select>
                </div>
            </div>

            <!-- 6 & 7. Kích thước W & H -->
            <div class="form-row">
                <div class="form-label">Kích thước</div>
                <div class="form-control">
                    <div class="kichthuoc-group">
                        <span>W:</span>
                        <input type="number" name="nmWidth" />
                        <span>H:</span>
                        <input type="number" name="nmHeight" />
                        <span>mm</span>
                    </div>
                </div>
            </div>

            <!-- 8. Số trang -->
            <div class="form-row">
                <div class="form-label">Số trang</div>
                <div class="form-control">
                    <input type="number" name="nmCount" style="width:80px" />
                    <span>trang</span>
                </div>
            </div>

            <!-- 9. Tác giả -->
            <div class="form-row">
                <div class="form-label">Tác giả</div>
                <div class="form-control">
                    <input type="text" name="nmTacGia" class="full" />
                </div>
            </div>

            <!-- 10. Giá + 11. Màu -->
            <div class="form-row">
                <div class="form-label">Giá</div>
                <div class="form-control">
                    <input type="text" name="nmPrice" style="width:120px" />
                    <span style="margin-left:8px">Màu:</span>
                    <input type="color" name="nmColor" value="#000000" />
                </div>
            </div>

            <!-- Xuất xứ -->
            <div class="form-row">
                <div class="form-label">Xuất xứ</div>
                <div class="form-control">
                    <input type="text" name="nmLive" class="full" placeholder="Không có" />
                </div>
            </div>

            <!-- 12. Thể loại (checkboxes) -->
            <div class="form-row">
                <div class="form-label">Thể Loại</div>
                <div class="form-control">
                    <div class="checkbox-grid">
                        <label><input type="checkbox" name="nmFunctions[]" value="vanHoc" /> Văn học</label>
                        <label><input type="checkbox" name="nmFunctions[]" value="thieuNhi" /> Thiếu nhi</label>
                        <label><input type="checkbox" name="nmFunctions[]" value="kinhTe" /> Kinh tế</label>
                        <label><input type="checkbox" name="nmFunctions[]" value="giaoKhoa" /> Giáo khoa</label>
                        <label><input type="checkbox" name="nmFunctions[]" value="tamLy" /> Tâm lý</label>
                        <label><input type="checkbox" name="nmFunctions[]" value="ngoaiNgu" /> Ngoại ngữ</label>
                    </div>
                </div>
            </div>

            <!-- Mô tả chi tiết -->
            <div class="mota-row">
                <div class="form-label">Mô tả chi tiết</div>
                <div style="flex:1">
                    <textarea name="nmProDet"></textarea>
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-group">
                <input type="submit" name="nmSubmit" value="Thêm" />
                <input type="reset" name="nmReset" value="Xóa" />
            </div>

        </form>
    </div>
</body>
</html>
