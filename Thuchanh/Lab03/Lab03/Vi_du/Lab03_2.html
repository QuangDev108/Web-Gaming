<head>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            background: #f5f5f5;
            color: #333;
            padding: 16px;
        }

        #container {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-title {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: #222;
        }

        .section-title {
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            color: #555;
            margin: 14px 0 10px;
            padding-bottom: 4px;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-divider {
            border: none;
            border-top: 1px solid #e8e8e8;
            margin: 10px 0;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .form-label {
            width: 130px;
            min-width: 130px;
            font-size: 13px;
            color: #444;
        }

        .form-control {
            flex: 1;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            color: #333;
            background: #fafafa;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="date"]:focus,
        select:focus {
            border-color: #4a90d9;
            background: #fff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 6px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px 12px;
            padding: 6px 0;
        }

        .checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        input[type="file"] {
            font-size: 12px;
            padding: 4px 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }

        input[type="submit"] {
            padding: 8px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="submit"]:hover {
            background: #357abd;
        }

        input[type="reset"] {
            padding: 8px 24px;
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="reset"]:hover {
