<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito Sans:wght@200;300;400;600;900&display=swap" rel="stylesheet">
    
    <!-- Css Styles -->
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/font-awesome.min.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/elegant-icons.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/nice-select.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/jquery-ui.min.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/owl.carousel.min.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/slicknav.min.css" type="text/css">

    <style>
        /* ===== Wrapper canh giữa slider, giới hạn width ~460px ===== */
        .categories__slider__wrapper {
            width: 70vw;
            margin: 0 auto;
            position: relative;
        }

        /* ===== Slider ảnh ===== */
        .categories__slider .item img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== Nút prev/next nằm ở 2 bên RÌA ảnh ===== */
        .categories__slider .owl-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .categories__slider .owl-nav button {
            pointer-events: all;
            background: rgba(0, 0, 0, 0.45) !important;
            color: #fff !important;
            width: 36px;
            height: 36px;
            border-radius: 50% !important;
            font-size: 20px !important;
            line-height: 36px !important;
            text-align: center;
            transition: background 0.2s;
        }

        .categories__slider .owl-nav button:hover {
            background: rgba(0, 0, 0, 0.75) !important;
        }

        /* Nút bên trái sát rìa trái */
        .categories__slider .owl-nav .owl-prev {
            margin-left: 6px;
        }

        /* Nút bên phải sát rìa phải */
        .categories__slider .owl-nav .owl-next {
            margin-right: 6px;
        }

        /* ===== Chấm tròn dots ===== */
        .categories__slider .owl-dots {
            text-align: center;
            margin-top: 10px;
        }

        .categories__slider .owl-dots .owl-dot span {
            width: 12px;
            height: 12px;
            margin: 0 4px;
            background: #ccc;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.3s;
        }

        .categories__slider .owl-dots .owl-dot.active span,
        .categories__slider .owl-dots .owl-dot:hover span {
            background: #333;
        }
    </style>
</head>
<body>
    

    <div class="categories__slider__wrapper">
        <div class="categories__slider owl-carousel">

            <div class="item">
                <img src="./img/slide_1.jpg" alt="Slide 1">
            </div>

            <div class="item">
                <img src="./img/slide_2.jpg" alt="Slide 2">
            </div>

            <div class="item">
                <img src="./img/slide_3.jpg" alt="Slide 3">
            </div>

            <div class="item">
                <img src="./img/slide_4.jpg" alt="Slide 4">
            </div>

            <div class="item">
                <img src="./img/slide_5.jpg" alt="Slide 5">
            </div>

        </div>
    </div>

    <!-- Js Plugins -->
    <script src="./assets/js/jquery-3.3.1.min.js"></script>
    <script src="./assets/js/bootstrap.min.js"></script>
    <script src="./assets/js/jquery.nice-select.min.js"></script>
    <script src="./assets/js/jquery-ui.min.js"></script>
    <script src="./assets/js/jquery.slicknav.js"></script>
    <script src="./assets/js/mixitup.min.js"></script>
    <script src="./assets/js/owl.carousel.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
